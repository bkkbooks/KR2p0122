body:
  text: 散見簡牘合輯湖北雲夢大墳頭一號漢墓木牘金兵二金小盂一金一金般一金鬲甗各一二斗一一斗一金鼎二𣲥畫盂二𣲥畫盛二合木檢一合𣲥畫小婄十𣲥畫大婄十𣲥畫小卑虒二𣲥畫閜二𦝦檢二其一小畫具器一具畫角傷二卑四金匕木匕各一𣲥畫勺一鐵枓金枓各一檢一合畫瓦瓮一木笥二笥李一篦博一具𣲥畫曲一一具竹傷四木壺一缶五竟檢一紫巾一橐三練橐二女子禺人四臣子七人大車軺車各一有盖黑馬二白馬五黃馬一金劍劍合豫疎一具一毋緹巾六金鍪一竹笥大二豆一級毋醬桮十緒桮廿桮十
